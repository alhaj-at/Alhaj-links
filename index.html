<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma, Arial, sans-serif;
background:linear-gradient(135deg,#050b15,#0d1b2a);
color:white;
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:450px;
padding:30px;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:3px solid #00aaff;
box-shadow:0 0 25px #00aaff;
margin-bottom:15px;
}

h1{
color:#4db8ff;
margin-bottom:10px;
}

p{
color:#b0b0b0;
margin-bottom:25px;
}

.btn{
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
color:white;
font-size:18px;
font-weight:bold;
padding:18px;
margin:15px 0;
border-radius:18px;
background:rgba(20,30,50,.8);
border:1px solid rgba(0,170,255,.5);
backdrop-filter:blur(10px);
overflow:hidden;
transition:0.4s;
box-shadow:0 0 15px rgba(0,170,255,.2);
}

.btn::before{
content:"";
position:absolute;
top:0;
right:-100%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(0,170,255,.4),
transparent
);
transition:.7s;
}

.btn:hover::before{
right:100%;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:
0 0 15px #00aaff,
0 0 30px rgba(0,170,255,.5);
border-color:#00ccff;
}

.footer{
margin-top:25px;
font-size:14px;
color:#777;
}
</style>
